# =============================================================================
# squid.conf — Configuration Proxy Cache Squid (Mode Mandataire)
# TP : Configuration du Caching dans un réseau via Proxy Squid
# =============================================================================
#
# ARCHITECTURE :
#   Clients (192.168.1.x) → Proxy eth0:192.168.1.100:3128 → eth1:192.168.2.100
#                           → R1 (192.168.2.1) → INTERNET (10.0.0.2)
#
# LOGIQUE DES ACL :
#   1. PC1 (192.168.1.10) → EXCEPTION : accès total, aucun filtrage
#   2. PC2, PC3, PC4      → FILTRAGE  : blacklist domaines + mots-clés
# =============================================================================


# ─────────────────────────────────────────────────────────────────────────────
# SECTION 1 : PORT ET MODE D'ÉCOUTE
# ─────────────────────────────────────────────────────────────────────────────

# Port standard Squid : 3128
# Les clients configurent leur navigateur/proxy sur 192.168.1.100:3128
http_port 3128

# Mode mandataire : Squid intercepte toutes les requêtes HTTP
# Les clients DOIVENT avoir leur passerelle = 192.168.1.100
# et pointer explicitement vers ce proxy


# ─────────────────────────────────────────────────────────────────────────────
# SECTION 2 : IDENTIFICATION DU PROXY
# ─────────────────────────────────────────────────────────────────────────────

# Nom visible du proxy dans les logs et les pages d'erreur
visible_hostname proxy.tp-reseau.local

# Email de l'administrateur (affiché sur les pages d'erreur)
cache_mgr admin@tp-reseau.local


# ─────────────────────────────────────────────────────────────────────────────
# SECTION 3 : CONFIGURATION DU CACHE DISQUE
# ─────────────────────────────────────────────────────────────────────────────
#
# PRINCIPE DU CACHE :
#   Quand un client demande http://10.0.0.2/, Squid :
#   1. Vérifie si la réponse est déjà en cache (→ TCP_HIT, répond immédiatement)
#   2. Sinon, transmet la requête au serveur (→ TCP_MISS), sauvegarde la réponse
#
# ufs   = système de fichiers Unix standard pour le cache Squid
# 1024  = taille du cache disque en MB (1 Go)
# 16    = nombre de répertoires de niveau 1
# 256   = nombre de répertoires de niveau 2

cache_dir ufs /var/spool/squid 1024 16 256

# Taille maximale d'un objet stocké en cache disque (ko)
maximum_object_size 50 MB

# Taille minimale d'un objet stocké en cache disque
minimum_object_size 0 KB


# ─────────────────────────────────────────────────────────────────────────────
# SECTION 4 : CONFIGURATION DU CACHE RAM (mémoire vive)
# ─────────────────────────────────────────────────────────────────────────────
#
# Le cache RAM est beaucoup plus rapide que le cache disque.
# Les objets les plus demandés sont gardés en RAM pour réponse instantanée.

# Mémoire totale allouée à Squid (cache RAM + structures internes)
cache_mem 256 MB

# Taille maximale d'un objet stocké EN RAM
maximum_object_size_in_memory 4096 KB

# Politique de remplacement du cache RAM : LRU (Least Recently Used)
# L'objet le moins récemment accédé est supprimé en premier
memory_replacement_policy lru

# Politique de remplacement du cache disque : LFUDA (Least Frequently Used with Dynamic Aging)
# Favorise les objets très demandés même s'ils sont volumineux
cache_replacement_policy heap LFUDA


# ─────────────────────────────────────────────────────────────────────────────
# SECTION 5 : OPTIMISATION DU CACHE — DURÉES DE RÉTENTION
# ─────────────────────────────────────────────────────────────────────────────
#
# refresh_pattern : définit combien de temps Squid conserve les objets
# Syntaxe : refresh_pattern <regex> <min> <pct> <max>
#   min  = durée minimale de cache en minutes
#   pct  = pourcentage de la durée de vie de l'objet
#   max  = durée maximale de cache en minutes

# Pages CGI / dynamiques : ne pas cacher
refresh_pattern -i (/cgi-bin/|\?) 0    0%   0

# Images (PNG, JPG, GIF, SVG...) : cache long (7 jours)
refresh_pattern -i \.(png|jpg|jpeg|gif|ico|svg|webp)$ 10080 50% 43200

# Fichiers CSS et JavaScript : cache moyen (24h)
refresh_pattern -i \.(css|js)$         1440  50% 10080

# Vidéos et fichiers lourds : cache court (1h)
refresh_pattern -i \.(mp4|avi|mkv|flv|wmv)$ 60 50% 1440

# Archives et exécutables : cache long
refresh_pattern -i \.(zip|tar|gz|bz2|exe|msi|deb|rpm)$ 1440 20% 10080

# Règle par défaut (tout le reste)
refresh_pattern .                        0    20%  4320


# ─────────────────────────────────────────────────────────────────────────────
# SECTION 6 : DÉFINITION DES ACL (Access Control Lists)
# ─────────────────────────────────────────────────────────────────────────────
#
# Une ACL est une condition nommée. Elle ne fait rien seule :
# elle est utilisée dans les règles http_access pour autoriser/bloquer.
#
# Syntaxe : acl <nom> <type> <valeur>

# ── ACL réseau de base ────────────────────────────────────────────────────────

# Réseau local des clients
acl lan_clients src 192.168.1.0/24

# Réseau intermédiaire Proxy-R1
acl lan_proxy_r1 src 192.168.2.0/24

# Loopback
acl localhost src 127.0.0.1/32

# Tous les postes du LAN
acl all src 0.0.0.0/0

# ── ACL pour les ports autorisés ──────────────────────────────────────────────
# Squid n'autorise que les requêtes vers des ports légitimes

acl SSL_ports port 443          # HTTPS
acl Safe_ports port 80          # HTTP
acl Safe_ports port 21          # FTP
acl Safe_ports port 443         # HTTPS
acl Safe_ports port 70          # Gopher
acl Safe_ports port 210         # WAIS
acl Safe_ports port 1025-65535  # Ports non-privilégiés
acl Safe_ports port 280         # http-mgmt
acl Safe_ports port 488         # gss-http
acl Safe_ports port 591         # filemaker
acl Safe_ports port 777         # multiling http

# Méthode CONNECT (tunnels SSL/HTTPS)
acl CONNECT method CONNECT

# ── ACL exception PC1 (accès total) ──────────────────────────────────────────
# PC1 est exempté de tout filtrage — il bénéficie d'un accès complet
acl pc1_exempt src 192.168.1.10/32

# ── ACL clients filtrés (PC2, PC3, PC4) ──────────────────────────────────────
acl clients_filtres src 192.168.1.20/32 192.168.1.30/32 192.168.1.40/32

# ── ACL Blacklist — Sites interdits (Domaines) ───────────────────────────────
#
# Méthode dstdomain : correspond au domaine de destination ET tous ses sous-domaines
# Exemple : .youtube.com bloque www.youtube.com, m.youtube.com, etc.

# YouTube et vidéo Google
acl blacklist_youtube dstdomain .youtube.com .ytimg.com .googlevideo.com .youtu.be

# Réseaux sociaux
acl blacklist_social dstdomain .facebook.com .instagram.com .tiktok.com .twitter.com .x.com .snapchat.com

# Streaming
acl blacklist_streaming dstdomain .netflix.com .twitch.tv

# Contenu adulte
acl blacklist_adult dstdomain .pornhub.com .xvideos.com .xnxx.com

# Divers
acl blacklist_misc dstdomain .roblox.com .discord.com

# Regroupement de toutes les blacklists en une seule ACL composite
# (On les utilisera une par une dans les règles pour des messages d'erreur distincts)

# ── ACL Blacklist — Mots-clés dans l'URL ─────────────────────────────────────
# urlpath_regex : filtre sur le chemin de l'URL (case-insensitive avec -i)
# Cette ACL bloque des URLs contenant des mots-clés suspects

acl blacklist_keywords urlpath_regex -i \
    /adult/ \
    /xxx/ \
    /porn/ \
    /hentai/ \
    /erotic/ \
    /torrent \
    /pirate \
    /crack/ \
    /keygen/ \
    /warez/


# ─────────────────────────────────────────────────────────────────────────────
# SECTION 7 : RÈGLES D'ACCÈS (http_access)
# ─────────────────────────────────────────────────────────────────────────────
#
# IMPORTANT : Les règles sont évaluées DE HAUT EN BAS, première correspondance gagne.
#
# Schéma de décision :
#   1. Bloquer les ports non sûrs
#   2. Autoriser PC1 (exception totale)
#   3. Bloquer les sites de la blacklist pour PC2/PC3/PC4
#   4. Autoriser le reste du LAN
#   5. Bloquer tout le reste

# ── Règle 1 : Bloquer les ports non sûrs ─────────────────────────────────────
# Refuser toute requête vers un port qui n'est pas dans Safe_ports
http_access deny !Safe_ports

# Refuser les CONNECT vers des ports non-SSL (sécurité)
http_access deny CONNECT !SSL_ports

# ── Règle 2 : Autoriser le localhost (gestion Squid) ─────────────────────────
http_access allow localhost

# ── Règle 3 : EXCEPTION PC1 — Accès Total ─────────────────────────────────────
# PC1 (192.168.1.10) est totalement exempté de filtrage.
# Cette règle est placée AVANT toutes les règles de blocage.
# Si la requête vient de PC1 → accès accordé immédiatement, aucun filtrage.
http_access allow pc1_exempt

# ── Règle 4 : FILTRAGE pour clients_filtres (PC2, PC3, PC4) ──────────────────

# 4a. Bloquer YouTube
http_access deny clients_filtres blacklist_youtube

# 4b. Bloquer les réseaux sociaux
http_access deny clients_filtres blacklist_social

# 4c. Bloquer le streaming
http_access deny clients_filtres blacklist_streaming

# 4d. Bloquer le contenu adulte
http_access deny clients_filtres blacklist_adult

# 4e. Bloquer les sites divers (roblox, discord)
http_access deny clients_filtres blacklist_misc

# 4f. Bloquer les URLs contenant des mots-clés interdits
http_access deny clients_filtres blacklist_keywords

# 4g. Autoriser le reste du trafic pour PC2/PC3/PC4 (sites non blacklistés)
http_access allow clients_filtres

# ── Règle 5 : Autoriser le LAN en général ────────────────────────────────────
http_access allow lan_clients
http_access allow lan_proxy_r1

# ── Règle 6 : Bloquer tout le reste ─────────────────────────────────────────
# Toute requête non correspondante à une règle précédente est refusée
http_access deny all


# ─────────────────────────────────────────────────────────────────────────────
# SECTION 8 : CONFIGURATION DES LOGS
# ─────────────────────────────────────────────────────────────────────────────

# Log d'accès : chaque requête HTTP est enregistrée ici
# Format : IP_client - [date] "méthode URL" code_HTTP taille résultat_cache
access_log /var/log/squid/access.log squid

# Log de cache : informations sur le comportement du cache
cache_log /var/log/squid/cache.log

# Log du processus Squid (démarrage, erreurs système)
pid_filename /var/run/squid.pid

# Niveau de détail des logs (1=minimal, 9=debug complet)
# En production : 1 ou 2. Pour le TP : niveau 2 pour plus d'informations
debug_options ALL,1


# ─────────────────────────────────────────────────────────────────────────────
# SECTION 9 : PERFORMANCE ET CONNEXIONS
# ─────────────────────────────────────────────────────────────────────────────

# Nombre maximum de connexions simultanées
max_filedescriptors 65536

# Timeout pour les connexions en attente (secondes)
connect_timeout 30 seconds

# Timeout pour recevoir les données du serveur
read_timeout 300 seconds

# Timeout d'inactivité d'un client
client_lifetime 1 day

# Timeout avant de fermer une connexion persistante
persistent_connection_after_error on

# Pipelines de requêtes HTTP (améliore les performances)
pipeline_prefetch 0


# ─────────────────────────────────────────────────────────────────────────────
# SECTION 10 : EN-TÊTES HTTP — ANONYMISATION (Optionnel)
# ─────────────────────────────────────────────────────────────────────────────
#
# Ces directives masquent les informations du client aux serveurs Web.
# Utile pour la confidentialité mais peut affecter certains sites.

# Masquer l'IP réelle du client (commenté par défaut pour le TP)
# forwarded_for off

# Supprimer l'en-tête Via (qui révèle la présence du proxy)
# via off

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 11 : INTERFACE DE GESTION (CACHEMGR)
# ─────────────────────────────────────────────────────────────────────────────

# Autoriser la consultation des statistiques depuis localhost uniquement
http_access allow manager localhost
http_access deny manager
